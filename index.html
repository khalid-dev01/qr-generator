<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QR Code Generator</title>
    
    <link rel="stylesheet" href="QR_style.css"> 
</head>
<body>

    <div class="card">
        <h2>QR Code Generator</h2>
        
        <div class="input-box">
            <input type="text" id="text" placeholder="Enter text or link...">
            <button id="btn">Generate</button>
        </div>

        <div class="qr-box">
            <img id="qr" src="" alt="">
        </div>
        <button id="shareBtn" class="share-btn" style="display: none;">Share QR Code 🔗</button>
    </div>

    <script src="QR.js"></script>
</body>
</html>
